<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICEGATE SCMTR JSON Utility - Stuffing</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --success: #28a745;
            --success-hover: #218838;
            --danger: #dc3545;
            --gray-bg: #e0e0e0;
            --panel-bg: #d4d4d4;
            --border-color: #a0a0a0;
            --text-color: #212529;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            background-color: var(--gray-bg);
            color: var(--text-color);
            padding: 20px;
        }

        .header-banner {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 25px;
        }

        .location-selector-card {
            background: #f8f9fa;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .location-selector-card h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
            text-transform: uppercase;
        }

        .radio-group {
            display: flex;
            gap: 30px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            background: #fff;
            padding: 10px 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .radio-label input {
            margin-right: 10px;
        }

        .radio-label.active {
            border-color: var(--primary);
            background-color: #e6f0ff;
        }

        fieldset {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 25px;
        }

        legend {
            border: 2px solid #444;
            padding: 5px 15px;
            font-weight: bold;
            font-size: 18px;
            color: #111;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .form-group label .required {
            color: var(--danger);
        }

        .form-control {
            padding: 6px 8px;
            font-size: 14px;
            border: 1px solid #888;
            border-radius: 4px;
            background-color: #fff;
            height: 34px;
        }

        .form-control[readonly] {
            background-color: #c8c8c8;
            cursor: not-allowed;
        }

        .dynamic-item {
            background: rgba(255,255,255,0.4);
            border: 1px dashed #999;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 15px;
            position: relative;
        }

        .dynamic-item .remove-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .action-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* Styles for the inline fetch button grouping */
        .inline-action-group {
            display: flex;
            gap: 5px;
        }
        
        .fetch-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            height: 34px;
            white-space: nowrap;
        }
        .fetch-btn:hover {
            background-color: var(--primary-hover);
        }

        .center-actions {
            text-align: center;
            margin: 30px 0;
        }

        .generate-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .output-panel {
            background-color: #272822;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 4px;
            margin-top: 25px;
            display: none;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #49483e;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .download-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        pre {
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        JSON Utility-Stuffing
    </div>

    <div class="location-selector-card">
        <h3>Select CFS Location Profile</h3>
        <div class="radio-group">
            <label class="radio-label active" id="lbl-chennai">
                <input type="radio" name="cfs_location" value="chennai" checked onchange="updateLocationProfile('chennai')"> Chennai CFS
            </label>
            <label class="radio-label" id="lbl-tuticorin">
                <input type="radio" name="cfs_location" value="tuticorin" onchange="updateLocationProfile('tuticorin')"> Tuticorin CFS
            </label>
            <label class="radio-label" id="lbl-vizag">
                <input type="radio" name="cfs_location" value="vizag" onchange="updateLocationProfile('vizag')"> Vizag CFS
            </label>
        </div>
    </div>

    <form id="stuffingForm">
        <fieldset>
            <legend>Manifest_Master/Message Head</legend>
            <div class="form-grid">
                <div class="form-group">
                    <label>SenderID <span class="required">*</span></label>
                    <input type="text" id="senderID" class="form-control" readonly required>
                </div>
                <div class="form-group">
                    <label>Message Type <span class="required">*</span></label>
                    <select id="messageType" class="form-control" required>
                        <option value="CUCHE01" selected>CUCHE01</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Port of Reporting <span class="required">*</span></label>
                    <input type="text" id="portOfReporting" class="form-control" readonly required>
                </div>
                <div class="form-group">
                    <label>Job Number <span class="required">*</span></label>
                    <input type="text" id="jobNumber" class="form-control" value="1005" required>
                </div>
                <div class="form-group">
                    <label>Job Date <span class="required">*</span></label>
                    <input type="text" id="jobDate" class="form-control" placeholder="YYYYMMDD" required>
                </div>
                <div class="form-group">
                    <label>Reporting Event <span class="required">*</span></label>
                    <select id="reportingEvent" class="form-control" required>
                        <option value="SF" selected>SF - STUFFING</option>
                        <option value="ST">ST - STRIPPING</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Reporting party Type <span class="required">*</span></label>
                    <input type="text" id="reportingPartyType" class="form-control" value="C" readonly required>
                </div>
                <div class="form-group">
                    <label>Reporting Party Code or Custodian Code <span class="required">*</span></label>
                    <input type="text" id="custodianCode" class="form-control" value="AALCS0399C" readonly required>
                </div>
                <div class="form-group">
                    <label>Reporting Location Name <span class="required">*</span></label>
                    <input type="text" id="reportingLocationName" class="form-control" value="SICALCFS" readonly required>
                </div>
                <div class="form-group">
                    <label>Reporting Location Code <span class="required">*</span></label>
                    <input type="text" id="reportingLocationCode" class="form-control" readonly required>
                </div>
                <div class="form-group">
                    <label>Authorised Person PAN <span class="required">*</span></label>
                    <input type="text" id="authorisedPersonPan" class="form-control" readonly required>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Cargo Container</legend>
            <div class="form-grid">
                <div class="form-group">
                    <label>Equipment Sequence No <span class="required">*</span></label>
                    <input type="text" id="eqSeqNo" class="form-control" value="1" readonly required>
                </div>
                <div class="form-group">
                    <label>Container ID <span class="required">*</span></label>
                    <input type="text" id="containerID" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Equipment Type <span class="required">*</span></label>
                    <select id="equipmentType" class="form-control" required>
                        <option value="CN" selected>CN</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Equipment Size <span class="required">*</span></label>
                    <input type="text" id="equipmentSize" class="form-control" placeholder="20" required>
                </div>
                <div class="form-group">
                    <label>Equipment Load Status <span class="required">*</span></label>
                    <input type="text" id="equipmentLoadStatus" class="form-control" value="FCL" required>
                </div>
                <div class="form-group">
                    <label>Final Destination Location <span class="required">*</span></label>
                    <input type="text" id="finalDestLocation" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Event Date <span class="required">*</span></label>
                    <input type="text" id="eventDate" class="form-control" placeholder="YYYYMMDDTHH:MM" required>
                </div>
                <div class="form-group">
                    <label>Equipment Seal Type <span class="required">*</span></label>
                    <input type="text" id="equipmentSealType" class="form-control" value="ESEAL" required>
                </div>
                <div class="form-group">
                    <label>Equipment Seal Number <span class="required">*</span></label>
                    <input type="text" id="equipmentSealNumber" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Equipment Status <span class="required">*</span></label>
                    <input type="text" id="equipmentStatus" class="form-control" value="94" required>
                </div>
                <div class="form-group">
                    <label>Equipment Package <span class="required">*</span></label>
                    <input type="text" id="equipmentPackage" class="form-control" value="PK" required>
                </div>
                <div class="form-group">
                    <label>Equipment Quantity <span class="required">*</span></label>
                    <input type="number" id="equipmentQuantity" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Equipment QUC <span class="required">*</span></label>
                    <input type="text" id="equipmentQUC" class="form-control" value="PKG" required>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Cargo Details</legend>
            <div id="cargoContainerList">
                <div class="dynamic-item" data-index="1">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Cargo Sequence No <span class="required">*</span></label>
                            <input type="text" class="form-control cargo-seq" value="1" readonly required>
                        </div>
                        <div class="form-group">
                            <label>Document Type <span class="required">*</span></label>
                            <input type="text" class="form-control cargo-doc-type" value="ESB" required>
                        </div>
                        <div class="form-group">
                            <label>Document Site <span class="required">*</span></label>
                            <input type="text" class="form-control cargo-doc-site" required>
                        </div>
                        <div class="form-group">
                            <label>Document Number <span class="required">*</span></label>
                            <input type="number" class="form-control cargo-doc-num" required>
                        </div>
                        <div class="form-group">
                            <label>Document Date <span class="required">*</span></label>
                            <input type="text" class="form-control cargo-doc-date" placeholder="YYYYMMDD" required>
                        </div>
                        <div class="form-group">
                            <label>Shipment Load Status <span class="required">*</span></label>
                            <input type="text" class="form-control cargo-load-status" value="F" required>
                        </div>
                        <div class="form-group">
                            <label>Package Type <span class="required">*</span></label>
                            <input type="text" class="form-control cargo-pkg-type" value="P" required>
                        </div>
                        <div class="form-group">
                            <label>Quantity <span class="required">*</span></label>
                            <input type="number" class="form-control cargo-qty" required>
                        </div>
                        <div class="form-group">
                            <label>Packets From <span class="required">*</span></label>
                            <input type="number" class="form-control cargo-pkts-from" value="1" required>
                        </div>
                        <div class="form-group">
                            <label>Packets To <span class="required">*</span></label>
                            <input type="number" class="form-control cargo-pkts-to" required>
                        </div>
                        <div class="form-group">
                            <label>MCIN/PCIN <span class="required">*</span></label>
                            <div class="inline-action-group">
                                <input type="text" class="form-control cargo-pcin" style="flex-grow: 1;" required>
                                <button type="button" class="fetch-btn" onclick="fetchRowCinNumber(this)">Fetch CIN</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <button type="button" class="action-btn" onclick="addCargoDetails()">Add New Cargo details</button>
        </fieldset>

        <div class="center-actions">
            <button type="button" class="generate-btn" onclick="generateSCMTRJson()">Generate JSON</button>
        </div>
    </form>

    <div class="output-panel" id="outputPanel">
        <div class="output-header">
            <h3 id="generatedFilename">Filename preview</h3>
            <button class="download-btn" onclick="downloadJSONFile()">Download JSON File</button>
        </div>
        <pre id="jsonPreview"></pre>
    </div>

    <script>
        const locationProfiles = {
            chennai: {
                senderID: "ALSPD8726BCCD002", portOfReporting: "INMAA1",
                reportingLocationCode: "INMAA1SMR1", authorisedPersonPan: "DERPS9790K"
            },
            tuticorin: {
                senderID: "ALSPD8726BCCD001", portOfReporting: "INTUT1",
                reportingLocationCode: "INTUT1", authorisedPersonPan: "CGYPS5520H"
            },
            vizag: {
                senderID: "INVTZ1SMR1", portOfReporting: "INVTZ1",
                reportingLocationCode: "INVTZ1", authorisedPersonPan: "ALSPD8726B"
            }
        };

        let generatedJsonData = null;
        let generatedFilenameStr = "";

        window.onload = function() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            document.getElementById('jobDate').value = `${yyyy}${mm}${dd}`;
            document.getElementById('eventDate').value = `${yyyy}${mm}${dd}T15:25`;
            updateLocationProfile('chennai');
        };

        function updateLocationProfile(locKey) {
            document.querySelectorAll('.radio-label').forEach(lbl => lbl.classList.remove('active'));
            document.getElementById(`lbl-${locKey}`).classList.add('active');

            const profile = locationProfiles[locKey];
            document.getElementById('senderID').value = profile.senderID;
            document.getElementById('portOfReporting').value = profile.portOfReporting;
            document.getElementById('reportingLocationCode').value = profile.reportingLocationCode;
            document.getElementById('authorisedPersonPan').value = profile.authorisedPersonPan;

            const dSite = document.querySelector('.cargo-doc-site');
            if (dSite) dSite.value = profile.portOfReporting;
        }

        function addCargoDetails() {
            const container = document.getElementById('cargoContainerList');
            const nextIndex = container.getElementsByClassName('dynamic-item').length + 1;
            const targetSite = document.getElementById('portOfReporting').value;

            const html = `
                <div class="dynamic-item" data-index="${nextIndex}">
                    <button type="button" class="remove-btn" onclick="this.parentElement.remove(); reindexCargo();">Remove</button>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Cargo Sequence No <span class="required">*</span></label>
                            <input type="text" class="form-control cargo-seq" value="${nextIndex}" readonly required>
                        </div>
                        <div class="form-group">
                            <label>Document Type <span class="required">*</span></label>
                            <input type="text" class="form-control cargo-doc-type" value="ESB" required>
                        </div>
                        <div class="form-group">
                            <label>Document Site <span class="required">*</span></label>
                            <input type="text" class="form-control cargo-doc-site" value="${targetSite}" required>
                        </div>
                        <div class="form-group">
                            <label>Document Number <span class="required">*</span></label>
                            <input type="number" class="form-control cargo-doc-num" required>
                        </div>
                        <div class="form-group">
                            <label>Document Date <span class="required">*</span></label>
                            <input type="text" class="form-control cargo-doc-date" placeholder="YYYYMMDD" required>
                        </div>
                        <div class="form-group">
                            <label>Shipment Load Status <span class="required">*</span></label>
                            <input type="text" class="form-control cargo-load-status" value="F" required>
                        </div>
                        <div class="form-group">
                            <label>Package Type <span class="required">*</span></label>
                            <input type="text" class="form-control cargo-pkg-type" value="P" required>
                        </div>
                        <div class="form-group">
                            <label>Quantity <span class="required">*</span></label>
                            <input type="number" class="form-control cargo-qty" required>
                        </div>
                        <div class="form-group">
                            <label>Packets From <span class="required">*</span></label>
                            <input type="number" class="form-control cargo-pkts-from" value="1" required>
                        </div>
                        <div class="form-group">
                            <label>Packets To <span class="required">*</span></label>
                            <input type="number" class="form-control cargo-pkts-to" required>
                        </div>
                        <div class="form-group">
                            <label>MCIN/PCIN <span class="required">*</span></label>
                            <div class="inline-action-group">
                                <input type="text" class="form-control cargo-pcin" style="flex-grow: 1;" required>
                                <button type="button" class="fetch-btn" onclick="fetchRowCinNumber(this)">Fetch CIN</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        function reindexCargo() {
            const rows = document.getElementById('cargoContainerList').getElementsByClassName('dynamic-item');
            for (let i = 0; i < rows.length; i++) {
                rows[i].setAttribute('data-index', i + 1);
                rows[i].querySelector('.cargo-seq').value = i + 1;
            }
        }

        // Automated function connected to your custom backend proxy
        async function fetchRowCinNumber(buttonElement) {
            // Locate the enclosing row elements contextually
            const containerRow = buttonElement.closest('.dynamic-item');
            
            const portInput = containerRow.querySelector('.cargo-doc-site');
            const sbInput = containerRow.querySelector('.cargo-doc-num');
            const dateInput = containerRow.querySelector('.cargo-doc-date');
            const pcinInput = containerRow.querySelector('.cargo-pcin');

            // Form validation checks
            if(!portInput.value || !sbInput.value || !dateInput.value) {
                alert("Please fill Document Site, Document Number, and Document Date first before fetching CIN.");
                return;
            }

            // Cleanup potential dashes/slashes inside the input to ensure string matches YYYYMMDD
            const formattedDate = dateInput.value.replace(/[-/]/g, "");

            buttonElement.innerText = "Fetching...";
            buttonElement.disabled = true;

            try {
                // Fetch request sent to your custom integration proxy backend running at port 5000
                const response = await fetch(`http://localhost:5000/get-cin?port=${encodeURIComponent(portInput.value)}&sb_no=${encodeURIComponent(sbInput.value)}&sb_date=${encodeURIComponent(formattedDate)}`);
                const data = await response.json();

                if (data.success) {
                    pcinInput.value = data.cin;
                } else {
                    alert("Error from ICEGATE Proxy: " + data.error);
                }
            } catch (error) {
                alert("Could not reach backend server proxy at port 5000. Verify that your Python/Node background script is running.");
            } finally {
                buttonElement.innerText = "Fetch CIN";
                buttonElement.disabled = false;
            }
        }

        function generateSCMTRJson() {
            const form = document.getElementById('stuffingForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const senderID = document.getElementById('senderID').value;
            const portOfReporting = document.getElementById('portOfReporting').value;
            const msgID = document.getElementById('messageType').value;
            const jobNo = parseInt(document.getElementById('jobNumber').value);
            const formattedJobDate = document.getElementById('jobDate').value;
            const reportingEvent = document.getElementById('reportingEvent').value;

            const payload = {
                headerField: {
                    indicator: "P",
                    messageID: msgID,
                    sequenceOrControlNumber: jobNo,
                    date: formattedJobDate,
                    time: "T" + new Date().toTimeString().substring(0,5),
                    reportingEvent: reportingEvent,
                    senderID: senderID,
                    receiverID: portOfReporting,
                    versionNo: "1.0"
                },
                master: {
                    declaration: {
                        messageType: "F",
                        portOfReporting: portOfReporting,
                        jobNo: jobNo,
                        jobDate: formattedJobDate,
                        reportingEvent: reportingEvent
                    },
                    location: {
                        reportingPartyType: document.getElementById('reportingPartyType').value,
                        reportingPartyCode: document.getElementById('custodianCode').value,
                        reportingLocationCode: document.getElementById('reportingLocationCode').value,
                        reportingLocationName: document.getElementById('reportingLocationName').value,
                        authorisedPersonPAN: document.getElementById('authorisedPersonPan').value
                    },
                    cargoContainer: [
                        {
                            messageType: "F",
                            equipmentSequenceNo: parseInt(document.getElementById('eqSeqNo').value) || 1,
                            equipmentID: document.getElementById('containerID').value,
                            equipmentType: document.getElementById('equipmentType').value,
                            equipmentSize: document.getElementById('equipmentSize').value,
                            equipmentLoadStatus: document.getElementById('equipmentLoadStatus').value,
                            finalDestinationLocation: document.getElementById('finalDestLocation').value,
                            eventDate: document.getElementById('eventDate').value,
                            equipmentSealType: document.getElementById('equipmentSealType').value,
                            equipmentSealNumber: document.getElementById('equipmentSealNumber').value,
                            equipmentStatus: document.getElementById('equipmentStatus').value,
                            equipmentPkg: document.getElementById('equipmentPackage').value,
                            equipmentQuantity: parseInt(document.getElementById('equipmentQuantity').value),
                            equipmentQUC: document.getElementById('equipmentQUC').value,
                            cargoDetails: []
                        }
                    ]
                }
            };

            const cargoRows = document.getElementById('cargoContainerList').getElementsByClassName('dynamic-item');
            for (let row of cargoRows) {
                payload.master.cargoContainer[0].cargoDetails.push({
                    messageType: "F",
                    cargoSequenceNo: parseInt(row.querySelector('.cargo-seq').value),
                    documentType: row.querySelector('.cargo-doc-type').value,
                    documentSite: row.querySelector('.cargo-doc-site').value,
                    documentNumber: parseInt(row.querySelector('.cargo-doc-num').value) || 0,
                    documentDate: row.querySelector('.cargo-doc-date').value,
                    shipmentLoadStatus: row.querySelector('.cargo-load-status').value,
                    packageType: row.querySelector('.cargo-pkg-type').value,
                    quantity: parseInt(row.querySelector('.cargo-qty').value) || 0,
                    packetsFrom: parseInt(row.querySelector('.cargo-pkts-from').value) || 1,
                    packetsTo: parseInt(row.querySelector('.cargo-pkts-to').value) || 0,
                    mcinPcin: row.querySelector('.cargo-pcin').value
                });
            }

            generatedFilenameStr = `F_${msgID}_${reportingEvent}_${senderID}_${jobNo}_${formattedJobDate}_DEC.json`;
            generatedJsonData = payload;

            document.getElementById('generatedFilename').innerText = generatedFilenameStr;
            document.getElementById('jsonPreview').innerText = JSON.stringify(payload, null, 2);
            document.getElementById('outputPanel').style.display = 'block';
            document.getElementById('outputPanel').scrollIntoView({ behavior: 'smooth' });
        }

        function downloadJSONFile() {
            if (!generatedJsonData) return;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(generatedJsonData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", generatedFilenameStr);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }
    </script>
</body>
</html>
