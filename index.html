<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SICAL CFS - SCMTR Multi-JSON Generator</title>
    <style>
        :root {
            --primary-color: #0ea5e9;
            --primary-dark: #0284c7;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #cbd5e1;
            --menu-bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            padding: 30px 20px;
            color: var(--text-main);
            line-height: 1.5;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        .header {
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.025em;
        }

        .header p {
            margin: 6px 0 0 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        fieldset {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 30px;
            background-color: var(--bg-card);
        }

        legend {
            font-weight: 600;
            padding: 0 12px;
            color: #334155;
            font-size: 16px;
        }

        .location-menu-panel {
            background-color: var(--menu-bg);
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.02);
        }

        .location-menu-panel label {
            font-weight: 600;
            font-size: 15px;
            color: #475569;
        }

        .location-select {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-dark);
            border: 2px solid var(--primary-color);
            border-radius: 6px;
            background-color: #fff;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }
        
        .location-select:hover {
            border-color: var(--primary-dark);
            background-color: #f0f9ff;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #475569;
        }

        input, select {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            background-color: #fff;
            color: var(--text-main);
            transition: all 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }

        /* Container Section Layout Styling */
        .container-block {
            border: 1px solid #bae6fd;
            padding: 24px;
            border-radius: 8px;
            margin-bottom: 25px;
            background-color: #f8fafc;
            position: relative;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }

        .container-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }

        .container-title {
            font-weight: 600;
            color: var(--primary-dark);
            font-size: 15px;
        }

        /* Cargo Section Layout Styling */
        .cargo-section {
            margin-top: 20px;
            padding-left: 20px;
            border-left: 3px solid var(--success-color);
        }

        .cargo-block {
            background-color: #ffffff;
            border: 1px solid #a7f3d0;
            padding: 18px;
            border-radius: 6px;
            margin-bottom: 12px;
            position: relative;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.02);
        }

        .cargo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 13px;
            font-weight: 600;
            color: #047857;
        }

        /* Action Controls Buttons */
        .btn {
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-submit {
            background-color: var(--success-color);
            color: white;
            padding: 14px 45px;
            font-size: 16px;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }

        .btn-submit:hover { 
            background-color: #059669; 
            transform: translateY(-1px);
        }

        .btn-add-container {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .btn-add-container:hover { background-color: var(--primary-dark); }

        .btn-add-cargo {
            background-color: #06b6d4;
            color: white;
            padding: 8px 14px;
            font-size: 12px;
            margin-top: 12px;
        }

        .btn-add-cargo:hover { background-color: #0891b2; }

        .btn-danger {
            background-color: #fef2f2;
            color: var(--danger-color);
            border: 1px solid #fee2e2;
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-danger:hover { 
            background-color: var(--danger-color); 
            color: white;
            border-color: var(--danger-color);
        }

        .button-zone {
            text-align: center;
            margin-top: 40px;
        }

        .footer {
            margin-top: 50px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SICAL CFS - CONFIGURATOR</h1>
        <p>JSON Entry Module (Supports Multiple Containers &amp; Multiple Cargo Lines)</p>
    </div>

    <!-- Location Selection Menu Screen Panel -->
    <div class="location-menu-panel">
        <label for="locationSelector">Select Reporting Location Menu Panel:</label>
        <select id="locationSelector" class="location-select" onchange="applyLocationConfiguration()">
            <option value="" selected>-- Select Location Template (Start Blank) --</option>
            <option value="chennai">Chennai</option>
            <option value="tuticorin">Tuticorin</option>
            <option value="vizag">Vizag</option>
        </select>
    </div>

    <form id="jsonForm" onsubmit="processAndDownload(event)">
        
        <fieldset>
            <legend>Manifest Master / Message Head</legend>
            <div class="form-grid">
                <div class="form-group">
                    <label>Message ID</label>
                    <input type="text" id="messageID" value="" required>
                </div>
                <div class="form-group">
                    <label>Sender ID</label>
                    <input type="text" id="senderID" value="" required>
                </div>
                <div class="form-group">
                    <label>Port of Reporting</label>
                    <input type="text" id="portOfReporting" value="" required>
                </div>
                <div class="form-group">
                    <label>Job Number</label>
                    <input type="number" id="jobNo" value="" required>
                </div>
                <div class="form-group">
                    <label>Job Date</label>
                    <input type="date" id="jobDate" value="" required>
                </div>
                <div class="form-group">
                    <label>Reporting Event</label>
                    <select id="reportingEvent">
                        <option value="SF" selected>SF - STUFFING</option>
                    </select>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Reporting Party &amp; Location Info</legend>
            <div class="form-grid">
                <div class="form-group">
                    <label>Reporting Party Code (Custodian)</label>
                    <input type="text" id="reportingPartyCode" value="" required>
                </div>
                <div class="form-group">
                    <label>Reporting Location Code</label>
                    <input type="text" id="reportingLocationCode" value="" required>
                </div>
                <div class="form-group">
                    <label>Reporting Location Name</label>
                    <input type="text" id="reportingLocationName" value="" required>
                </div>
                <div class="form-group">
                    <label>Authorised Person PAN</label>
                    <input type="text" id="authorisedPAN" value="" required>
                </div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Equipment / Container Manifest Registry</legend>
            
            <div id="containersWrapper"></div>

            <button type="button" class="btn btn-add-container" onclick="addContainerBlock()">+ Add Container</button>
        </fieldset>

        <div class="button-zone">
            <button type="submit" class="btn btn-submit">Generate &amp; Download JSON</button>
        </div>
    </form>

    <div class="footer">
        Copyright &copy; 2026 Design and Developed by National Informatics Centre. Version 2.0
    </div>
</div>

<script>
    let containerCounter = 0;

    // Location Config Object Matrix Map
    const locationConfigs = {
        chennai: {
            senderID: "ALSPD8726BCCD002",
            portOfReporting: "INMAA1",
            reportingLocationCode: "INMAA1",
            authorisedPAN: "DERPS9790K"
        },
        tuticorin: {
            senderID: "ALSPD8726BCCD001",
            portOfReporting: "INTUT1",
            reportingLocationCode: "INTUT1",
            authorisedPAN: "CGYPS5520H"
        },
        vizag: {
            senderID: "INVTZ1SMR1",
            portOfReporting: "INVTZ1",
            reportingLocationCode: "INVTZ1",
            authorisedPAN: "ALSPD8726B"
        }
    };

    function applyLocationConfiguration() {
        const selectedLoc = document.getElementById('locationSelector').value;
        
        if (!selectedLoc) {
            document.getElementById('messageID').value = "";
            document.getElementById('senderID').value = "";
            document.getElementById('portOfReporting').value = "";
            document.getElementById('reportingPartyCode').value = "";
            document.getElementById('reportingLocationCode').value = "";
            document.getElementById('reportingLocationName').value = "";
            document.getElementById('authorisedPAN').value = "";
            return;
        }

        const data = locationConfigs[selectedLoc];

        document.getElementById('messageID').value = "CUCHE01";
        document.getElementById('reportingPartyCode').value = "AALCS0399C";
        document.getElementById('reportingLocationName').value = "SICAL CFS";

        document.getElementById('senderID').value = data.senderID;
        document.getElementById('portOfReporting').value = data.portOfReporting;
        document.getElementById('reportingLocationCode').value = data.reportingLocationCode;
        document.getElementById('authorisedPAN').value = data.authorisedPAN;
    }

    document.addEventListener("DOMContentLoaded", function() {
        addContainerBlock();
    });

    function addContainerBlock() {
        containerCounter++;
        const containerWrapper = document.getElementById('containersWrapper');

        const containerHtml = `
            <div class="container-block" id="containerBlock_${containerCounter}" data-index="${containerCounter}">
                <div class="container-header">
                    <span class="container-title">Container Entry #${containerCounter}</span>
                    ${containerCounter > 1 ? `<button type="button" class="btn btn-danger" onclick="removeElement('containerBlock_${containerCounter}')">Remove Container</button>` : ''}
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Container / Equipment ID</label>
                        <input type="text" class="element-equipmentID" value="" placeholder="e.g. WHSU2834040" required>
                    </div>
                    <div class="form-group">
                        <label>Equipment Size</label>
                        <input type="text" class="element-equipmentSize" value="" placeholder="e.g. 20" required>
                    </div>
                    <div class="form-group">
                        <label>Equipment E-Seal Number</label>
                        <input type="text" class="element-equipmentSealNumber" value="" placeholder="e.g. ESSC01188177" required>
                    </div>
                    <div class="form-group">
                        <label>Equipment Total Qty</label>
                        <input type="number" class="element-equipmentQuantity" value="" placeholder="e.g. 358" required>
                    </div>
                </div>

                <div class="cargo-section">
                    <div class="cargo-wrapper" id="cargoWrapper_${containerCounter}"></div>
                    <button type="button" class="btn btn-add-cargo" onclick="addCargoBlock(${containerCounter})">+ Add Cargo Row to this Container</button>
                </div>
            </div>
        `;
        
        containerWrapper.insertAdjacentHTML('beforeend', containerHtml);
        addCargoBlock(containerCounter);
    }

    function addCargoBlock(containerId) {
        const targetCargoWrapper = document.getElementById(`cargoWrapper_${containerId}`);
        const currentCargoLines = targetCargoWrapper.getElementsByClassName('cargo-block').length + 1;

        const cargoHtml = `
            <div class="cargo-block">
                <div class="cargo-header">
                    <span>Cargo Line Information Line Item</span>
                    ${currentCargoLines > 1 ? `<button type="button" class="btn btn-danger" style="padding:4px 8px;" onclick="this.parentElement.parentElement.remove()">Remove Cargo</button>` : ''}
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" class="element-cargoQuantity" value="" placeholder="e.g. 358" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>MCIN / PCIN Number</label>
                        <input type="text" class="element-cargoMcinPcin" value="" placeholder="e.g. 25PCEG12242905694800" required>
                    </div>
                </div>
            </div>
        `;
        targetCargoWrapper.insertAdjacentHTML('beforeend', cargoHtml);
    }

    function removeElement(id) {
        const targetElement = document.getElementById(id);
        if(targetElement) targetElement.remove();
    }

    function processAndDownload(event) {
        event.preventDefault();

        const msgId = document.getElementById('messageID').value.trim();
        const senderId = document.getElementById('senderID').value.trim();
        const portOfReport = document.getElementById('portOfReporting').value.trim();
        const jobNo = document.getElementById('jobNo').value.trim();
        const rawDate = document.getElementById('jobDate').value;
        const formattedDate = rawDate.replace(/-/g, "");
        
        const repPartyCode = document.getElementById('reportingPartyCode').value.trim();
        const repLocCode = document.getElementById('reportingLocationCode').value.trim();
        const repLocName = document.getElementById('reportingLocationName').value.trim();
        const authPan = document.getElementById('authorisedPAN').value.trim();

        const structuralContainersArray = [];
        const containerBlocks = document.getElementsByClassName('container-block');

        for (let i = 0; i < containerBlocks.length; i++) {
            const currentBlock = containerBlocks[i];
            
            const eqId = currentBlock.querySelector('.element-equipmentID').value.trim();
            const eqSize = currentBlock.querySelector('.element-equipmentSize').value.trim();
            const eqSeal = currentBlock.querySelector('.element-equipmentSealNumber').value.trim();
            const eqQty = parseInt(currentBlock.querySelector('.element-equipmentQuantity').value, 10);

            const structuralCargoArray = [];
            const cargoBlocks = currentBlock.getElementsByClassName('cargo-block');

            for (let j = 0; j < cargoBlocks.length; j++) {
                const currentCargo = cargoBlocks[j];
                const cQty = parseInt(currentCargo.querySelector('.element-cargoQuantity').value, 10);
                const cMcin = currentCargo.querySelector('.element-cargoMcinPcin').value.trim();

                structuralCargoArray.push({
                    "messageType": "F",
                    "cargoSequenceNo": j + 1,
                    "documentType": "ESB",
                    "documentSite": portOfReport,
                    "documentNumber": "8164013",
                    "documentDate": formattedDate,
                    "shipmentLoadStatus": "F",
                    "packageType": "P",
                    "quantity": cQty,
                    "packetsFrom": 1,
                    "packetsTo": cQty,
                    "packUQC": "P",
                    "mcinPcin": cMcin
                });
            }

            structuralContainersArray.push({
                "messageType": "F",
                "equipmentSequenceNo": i + 1,
                "equipmentID": eqId,
                "equipmentType": "BL",
                "equipmentSize": eqSize,
                "equipmentLoadStatus": "FCL",
                "finalDestinationLocation": "INMAA1CCT1",
                "eventDate": formattedDate + "T12:15",
                "equipmentSealType": "E",
                "equipmentSealNumber": eqSeal,
                "equipmentStatus": "94",
                "equipmentQuantity": eqQty,
                "equipmentQUC": "PKG",
                "cargoDetails": structuralCargoArray
            });
        }

        const finalPayload = {
            "headerField": {
                "indicator": "P",
                "messageID": msgId,
                "sequenceOrControlNumber": 6,
                "date": formattedDate,
                "time": "T" + new Date().toTimeString().split(' ')[0].substring(0,5),
                "reportingEvent": "SF",
                "senderID": senderId,
                "receiverID": portOfReport,
                "versionNo": "2"
            },
            "master": {
                "declaration": {
                    "messageType": "F",
                    "portOfReporting": portOfReport,
                    "jobNo": parseInt(jobNo, 10),
                    "jobDate": formattedDate,
                    "reportingEvent": "SF"
                },
                "location": {
                    "reportingPartyType": "C",
                    "reportingPartyCode": repPartyCode,
                    "reportingLocationCode": repLocCode,
                    "reportingLocationName": repLocName,
                    "authorisedPersonPAN": authPan
                },
                "cargoContainer": structuralContainersArray
            }
        };

        const generatedFilename = `F_${msgId}_SFCN_${senderId}_${jobNo}_${formattedDate}_DEC.json`;
        const jsonString = JSON.stringify(finalPayload, null, 2);
        const dataBlob = new Blob([jsonString], { type: 'application/json' });
        const downloadUrl = URL.createObjectURL(dataBlob);
        
        const helperLink = document.createElement('a');
        helperLink.href = downloadUrl;
        helperLink.download = generatedFilename;
        document.body.appendChild(helperLink);
        helperLink.click();
        
        document.body.removeChild(helperLink);
        URL.revokeObjectURL(downloadUrl);
    }
</script>

</body>
</html>
